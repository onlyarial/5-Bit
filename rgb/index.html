<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGB Gradient Tool | onlyarial</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icon-oa.png?v=1">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1115;
      color: white;
      font-family: Inter, Arial, sans-serif;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 22px;
      padding: 35px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 24px;
      color: white;
      background: #232833;
      border: 1px solid #2a2f3a;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    h1 { margin: 0; font-size: 38px; }

    .subtitle {
      color: #9ca3af;
      margin-top: 8px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 14px;
    }

    textarea, input, select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #2a2f3a;
      background: #0f1115;
      color: white;
      padding: 14px;
      font-size: 16px;
      outline: none;
    }

    textarea { min-height: 100px; resize: vertical; }

    textarea:focus, input:focus, select:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
    }

    .icon-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .style-btn, .small-btn {
      background: #232833;
      color: white;
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .style-btn.active {
      background: #ef4444;
      border-color: #ef4444;
    }

    .preview {
      margin-top: 24px;
      padding: 22px;
      background: #0f1115;
      border: 1px solid #2a2f3a;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 700;
      word-break: break-word;
      min-height: 80px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { background: #ef4444; color: white; }
    .secondary { background: #232833; color: white; }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <a class="back-btn" href="../">← Back Home</a>

    <h1>RGB Gradient Tool</h1>
    <div class="subtitle">Create Minecraft RGB gradient text for chat, ranks, MOTDs, and plugins.</div>

    <label>Text</label>
    <textarea id="inputText">OnlyArial</textarea>

    <div class="grid">
      <div>
        <label>Start Color</label>
        <input id="startColor" type="color" value="#ef4444">
      </div>

      <div>
        <label>End Color</label>
        <input id="endColor" type="color" value="#ffffff">
      </div>

      <div>
        <label>Output Format</label>
        <select id="format">
          <option value="minimessage">MiniMessage</option>
          <option value="&#">&#rrggbb</option>
          <option value="json">JSON</option>
          <option value="section">§x§r§r§g§g§b§b</option>
          <option value="ampersand">&x&r&r&g&g&b&b</option>
          <option value="bracket">&lt;#rrggbb&gt;</option>
        </select>
      </div>

      <div>
        <label>Characters Per Color</label>
        <div class="mini-grid">
          <button class="small-btn" onclick="changeValue('charsPerColor', -1)">−</button>
          <input id="charsPerColor" type="number" min="1" value="1">
          <button class="small-btn" onclick="changeValue('charsPerColor', 1)">+</button>
        </div>
      </div>

      <div>
        <label>Color Amount</label>
        <div class="mini-grid">
          <button class="small-btn" onclick="changeValue('colorAmount', -1)">−</button>
          <input id="colorAmount" type="number" min="0" value="0">
          <button class="small-btn" onclick="changeValue('colorAmount', 1)">+</button>
        </div>
      </div>

      <div>
        <label>Formatting</label>
        <div class="icon-row">
          <button class="style-btn" data-style="bold">B</button>
          <button class="style-btn" data-style="italic"><i>I</i></button>
          <button class="style-btn" data-style="underline"><u>U</u></button>
          <button class="style-btn" data-style="strike"><s>S</s></button>
          <button class="style-btn" data-style="obfuscate">&k</button>
        </div>
      </div>
    </div>

    <div class="icon-row">
      <button class="small-btn" onclick="swapColors()">↔ Swap Colors</button>
      <button class="small-btn" onclick="randomColors()">🎲 Random Colors</button>
    </div>

    <label>Preview</label>
    <div id="preview" class="preview"></div>

    <label>Output</label>
    <textarea id="output" readonly></textarea>

    <div class="buttons">
      <button class="primary" onclick="copyOutput()">Copy Output</button>
      <button class="secondary" onclick="resetTool()">Reset</button>
    </div>

    <div class="footer">By onlyarial</div>
  </div>

  <script>
    const inputText = document.getElementById("inputText");
    const startColor = document.getElementById("startColor");
    const endColor = document.getElementById("endColor");
    const format = document.getElementById("format");
    const charsPerColor = document.getElementById("charsPerColor");
    const colorAmount = document.getElementById("colorAmount");
    const preview = document.getElementById("preview");
    const output = document.getElementById("output");

    const activeStyles = {
      bold: false,
      italic: false,
      underline: false,
      strike: false,
      obfuscate: false
    };

    document.querySelectorAll(".style-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const style = btn.dataset.style;
        activeStyles[style] = !activeStyles[style];
        btn.classList.toggle("active", activeStyles[style]);
        generate();
      });
    });

    [inputText, startColor, endColor, format, charsPerColor, colorAmount].forEach(el => {
      el.addEventListener("input", generate);
    });

    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      return {
        r: parseInt(hex.substring(0, 2), 16),
        g: parseInt(hex.substring(2, 4), 16),
        b: parseInt(hex.substring(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map(x => {
        const h = Math.round(x).toString(16);
        return h.length === 1 ? "0" + h : h;
      }).join("");
    }

    function legacyHex(hex, symbol) {
      return symbol + "x" + hex.replace("#", "").split("").map(c => symbol + c).join("");
    }

    function getStyleCodes(symbol) {
      let codes = "";
      if (activeStyles.bold) codes += symbol + "l";
      if (activeStyles.italic) codes += symbol + "o";
      if (activeStyles.underline) codes += symbol + "n";
      if (activeStyles.strike) codes += symbol + "m";
      if (activeStyles.obfuscate) codes += symbol + "k";
      return codes;
    }

    function getMiniStyleOpen() {
      let codes = "";
      if (activeStyles.bold) codes += "<bold>";
      if (activeStyles.italic) codes += "<italic>";
      if (activeStyles.underline) codes += "<underlined>";
      if (activeStyles.strike) codes += "<strikethrough>";
      if (activeStyles.obfuscate) codes += "<obfuscated>";
      return codes;
    }

    function getGradientColors(text) {
      const chars = [...text];
      const start = hexToRgb(startColor.value);
      const end = hexToRgb(endColor.value);

      const perColor = Math.max(1, Number(charsPerColor.value));
      const forcedAmount = Math.max(0, Number(colorAmount.value));
      const steps = forcedAmount > 0 ? forcedAmount : Math.ceil(chars.length / perColor);

      return chars.map((char, i) => {
        const group = Math.floor(i / perColor);
        const t = steps <= 1 ? 0 : Math.min(group, steps - 1) / (steps - 1);

        return {
          char,
          color: rgbToHex(
            start.r + (end.r - start.r) * t,
            start.g + (end.g - start.g) * t,
            start.b + (end.b - start.b) * t
          )
        };
      });
    }

    function escapeHtml(char) {
      return char
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function generate() {
      const text = inputText.value;
      const colors = getGradientColors(text);

      preview.innerHTML = colors.map(item => {
        let css = `color:${item.color};`;
        if (activeStyles.bold) css += "font-weight:900;";
        if (activeStyles.italic) css += "font-style:italic;";
        if (activeStyles.underline) css += "text-decoration:underline;";
        if (activeStyles.strike) css += "text-decoration:line-through;";
        return `<span style="${css}">${escapeHtml(item.char)}</span>`;
      }).join("");

      let result = "";

      if (format.value === "minimessage") {
        result = colors.map(item => `<${item.color}>${getMiniStyleOpen()}${item.char}`).join("");
      }

      if (format.value === "&#") {
        result = colors.map(item => `&${item.color}${getStyleCodes("&")}${item.char}`).join("");
      }

      if (format.value === "json") {
        result = JSON.stringify(colors.map(item => ({
          text: item.char,
          color: item.color,
          bold: activeStyles.bold || undefined,
          italic: activeStyles.italic || undefined,
          underlined: activeStyles.underline || undefined,
          strikethrough: activeStyles.strike || undefined,
          obfuscated: activeStyles.obfuscate || undefined
        })), null, 2);
      }

      if (format.value === "section") {
        result = colors.map(item => legacyHex(item.color, "§") + getStyleCodes("§") + item.char).join("");
      }

      if (format.value === "ampersand") {
        result = colors.map(item => legacyHex(item.color, "&") + getStyleCodes("&") + item.char).join("");
      }

      if (format.value === "bracket") {
        result = colors.map(item => `<${item.color}>${getMiniStyleOpen()}${item.char}`).join("");
      }

      output.value = result;
    }

    function changeValue(id, amount) {
      const el = document.getElementById(id);
      el.value = Math.max(Number(el.min || 0), Number(el.value) + amount);
      generate();
    }

    function copyOutput() {
      navigator.clipboard.writeText(output.value);
    }

    function swapColors() {
      const old = startColor.value;
      startColor.value = endColor.value;
      endColor.value = old;
      generate();
    }

    function randomHex() {
      return "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");
    }

    function randomColors() {
      startColor.value = randomHex();
      endColor.value = randomHex();
      generate();
    }

    function resetTool() {
      inputText.value = "OnlyArial";
      startColor.value = "#ef4444";
      endColor.value = "#ffffff";
      format.value = "minimessage";
      charsPerColor.value = 1;
      colorAmount.value = 0;

      Object.keys(activeStyles).forEach(k => activeStyles[k] = false);
      document.querySelectorAll(".style-btn").forEach(btn => btn.classList.remove("active"));

      generate();
    }

    generate();
  </script>

</body>
</html>
