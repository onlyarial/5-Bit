<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGB Gradient Tool | onlyarial</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icon-oa.png?v=1">
  <link rel="shortcut icon" href="../icon-oa.png?v=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1115;
      color: #ffffff;
      font-family: Inter, Arial, sans-serif;
      padding: 40px 20px;
    }

    .page {
      max-width: 1180px;
      margin: auto;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 24px;
      color: white;
      background: #232833;
      border: 1px solid #2a2f3a;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .back-btn:hover {
      background: #2f3644;
      border-color: #ef4444;
    }

    .header,
    .input-card,
    .tool-card,
    .info {
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .header {
      padding: 30px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .subtitle {
      margin-top: 8px;
      color: #9ca3af;
      font-size: 16px;
      line-height: 1.5;
    }

    .input-card {
      padding: 24px;
      margin-bottom: 24px;
    }

    .input-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: stretch;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 700;
      font-size: 14px;
    }

    textarea,
    input,
    select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a2f3a;
      background: #0f1115;
      color: white;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    textarea {
      resize: vertical;
      min-height: 54px;
      line-height: 1.45;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    .style-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: #0f1115;
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      padding: 8px;
      height: fit-content;
      align-self: end;
    }

    .style-btn {
      min-width: 38px;
      height: 38px;
      background: #232833;
      color: white;
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .style-btn:hover {
      background: #2f3644;
    }

    .style-btn.active {
      background: #ef4444;
      border-color: #ef4444;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }

    .tool-card {
      padding: 24px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .step-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .small-btn,
    .tool-btn {
      background: #232833;
      color: white;
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .small-btn {
      height: 44px;
      font-size: 22px;
      padding: 0;
    }

    .tool-btn {
      padding: 11px 13px;
      font-size: 13px;
    }

    .small-btn:hover,
    .tool-btn:hover {
      background: #2f3644;
      border-color: #ef4444;
    }

    .color-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .color-item {
      display: grid;
      grid-template-columns: 44px 1fr 38px;
      gap: 8px;
      align-items: center;
    }

    .color-item input[type="color"] {
      height: 44px;
      padding: 5px;
      cursor: pointer;
    }

    .remove-color {
      height: 44px;
      background: #232833;
      border: 1px solid #2a2f3a;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 900;
      transition: 0.2s ease;
    }

    .remove-color:hover {
      background: #ef4444;
      border-color: #ef4444;
    }

    .tool-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .output-area {
      min-height: 128px;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
    }

    .preview {
      padding: 16px;
      min-height: 66px;
      background: #0f1115;
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      font-size: 24px;
      font-weight: 800;
      word-break: break-word;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: #cbd5e1;
      font-weight: 700;
      font-size: 14px;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: #ef4444;
    }

    .primary {
      background: #ef4444;
      color: white;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 13px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary:hover {
      background: #f87171;
      border-color: #f87171;
    }

    .secondary {
      background: #232833;
      color: white;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      padding: 13px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .secondary:hover {
      background: #2f3644;
      border-color: #ef4444;
    }

    .info {
      margin-top: 24px;
      padding: 18px;
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 14px;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 950px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .input-top {
        grid-template-columns: 1fr;
      }

      .style-row {
        justify-content: center;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 28px 14px;
      }

      h1 {
        font-size: 30px;
      }

      .header,
      .input-card,
      .tool-card {
        padding: 20px;
      }

      .options-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="page">

    <a class="back-btn" href="../">← Back Home</a>

    <div class="header">
      <h1>RGB Gradient Tool</h1>
      <div class="subtitle">
        Create Minecraft RGB gradient text for chat, ranks, MOTDs, and plugins.
      </div>
    </div>

    <div class="input-card">
      <div class="input-top">
        <div>
          <label for="inputText">Input Text</label>
          <textarea id="inputText" placeholder="Type here to generate a gradient!"></textarea>
        </div>

        <div class="style-row">
          <button class="style-btn" data-style="bold" title="Bold">B</button>
          <button class="style-btn" data-style="italic" title="Italic"><i>I</i></button>
          <button class="style-btn" data-style="underline" title="Underline"><u>U</u></button>
          <button class="style-btn" data-style="strike" title="Strikethrough"><s>S</s></button>
          <button class="style-btn" data-style="obfuscate" title="Obfuscate">&k</button>
        </div>
      </div>
    </div>

    <div class="main-grid">

      <div class="tool-card">
        <div class="section-title">Colors</div>

        <label>Characters per color</label>
        <div class="step-row">
          <button class="small-btn" onclick="changeValue('charsPerColor', -1)">−</button>
          <input id="charsPerColor" type="number" min="1" value="1">
          <button class="small-btn" onclick="changeValue('charsPerColor', 1)">+</button>
        </div>

        <label>Color Amount</label>
        <div class="step-row">
          <button class="small-btn" onclick="changeColorAmount(-1)">−</button>
          <input id="colorAmount" type="number" min="2" value="2">
          <button class="small-btn" onclick="changeColorAmount(1)">+</button>
        </div>

        <div id="colorList" class="color-list"></div>

        <div class="tool-row">
          <button class="tool-btn" onclick="addColor()">Add</button>
          <button class="tool-btn" onclick="copyColors()">Copy</button>
          <button class="tool-btn" onclick="swapColors()">Swap</button>
          <button class="tool-btn" onclick="shuffleColors()">Shuffle</button>
          <button class="tool-btn" onclick="randomColors()">Random</button>
          <button class="tool-btn" onclick="reverseColors()">Reverse</button>
        </div>
      </div>

      <div class="tool-card">
        <div class="section-title">Output</div>
        <div style="color:#9ca3af;margin-bottom:10px;">Copy-paste this for RGB text.</div>

        <textarea id="output" class="output-area" readonly></textarea>

        <label style="margin-top:16px;">Preview</label>
        <div id="preview" class="preview"></div>

        <div class="section-title" style="margin-top:22px;">Options</div>

        <div class="options-grid">
          <div>
            <label>Color Format</label>
            <select id="format">
              <option value="ampHex">&#rrggbb</option>
              <option value="minimessage">MiniMessage</option>
              <option value="json">JSON</option>
              <option value="section">§x§r§r§g§g§b§b</option>
              <option value="ampersand">&x&r&r&g&g&b&b</option>
              <option value="bracket">&lt;#rrggbb&gt;</option>
            </select>
          </div>

          <div>
            <label>Gradient Type</label>
            <select id="gradientType">
              <option value="rgb">rgb</option>
              <option value="hsv">hsv</option>
            </select>
          </div>
        </div>

        <label style="margin-top:16px;">Prefix/Suffix</label>
        <input id="prefixSuffix" placeholder="/nick $t">

        <label class="toggle">
          <input id="trimSpaces" type="checkbox" checked>
          Trim colors from spaces
        </label>

        <label class="toggle">
          <input id="lowercaseHex" type="checkbox">
          Lowercase Hex Codes
        </label>

        <label class="toggle">
          <input id="alwaysDisperse" type="checkbox">
          Always Disperse Colors
        </label>

        <div class="tool-row">
          <button class="primary" onclick="copyOutput()">Copy Output</button>
          <button class="secondary" onclick="resetTool()">Reset</button>
        </div>
      </div>

    </div>

    <div class="info">
      A self-hosted Minecraft RGB gradient generator for creating formatted text with multiple colors, styles, and export formats.
    </div>

    <div class="footer">By onlyarial</div>

  </div>

  <script>
    const inputText = document.getElementById("inputText");
    const output = document.getElementById("output");
    const preview = document.getElementById("preview");
    const colorList = document.getElementById("colorList");
    const colorAmount = document.getElementById("colorAmount");
    const charsPerColor = document.getElementById("charsPerColor");
    const format = document.getElementById("format");
    const gradientType = document.getElementById("gradientType");
    const prefixSuffix = document.getElementById("prefixSuffix");
    const trimSpaces = document.getElementById("trimSpaces");
    const lowercaseHex = document.getElementById("lowercaseHex");
    const alwaysDisperse = document.getElementById("alwaysDisperse");

    let colors = ["#ef4444", "#ffffff"];

    const activeStyles = {
      bold: false,
      italic: false,
      underline: false,
      strike: false,
      obfuscate: false
    };

    document.querySelectorAll(".style-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const style = btn.dataset.style;
        activeStyles[style] = !activeStyles[style];
        btn.classList.toggle("active", activeStyles[style]);
        generate();
      });
    });

    [
      inputText,
      charsPerColor,
      format,
      gradientType,
      prefixSuffix,
      trimSpaces,
      lowercaseHex,
      alwaysDisperse
    ].forEach(el => {
      el.addEventListener("input", generate);
      el.addEventListener("change", generate);
    });

    colorAmount.addEventListener("input", () => {
      setColorAmount(Number(colorAmount.value));
    });

    function renderColors() {
      colorList.innerHTML = "";

      colors.forEach((color, index) => {
        const row = document.createElement("div");
        row.className = "color-item";

        row.innerHTML = `
          <input type="color" value="${color}" data-index="${index}">
          <input type="text" value="${color}" data-index="${index}">
          <button class="remove-color" onclick="removeColor(${index})">×</button>
        `;

        colorList.appendChild(row);
      });

      colorList.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", e => {
          const index = Number(e.target.dataset.index);
          let value = e.target.value;

          if (!value.startsWith("#")) value = "#" + value;

          if (/^#[0-9a-fA-F]{6}$/.test(value)) {
            colors[index] = value;
            renderColors();
            generate();
          }
        });
      });

      colorAmount.value = colors.length;
    }

    function addColor() {
      colors.push(randomHex());
      renderColors();
      generate();
    }

    function removeColor(index) {
      if (colors.length <= 2) return;
      colors.splice(index, 1);
      renderColors();
      generate();
    }

    function setColorAmount(amount) {
      amount = Math.max(2, amount || 2);

      while (colors.length < amount) colors.push(randomHex());
      while (colors.length > amount) colors.pop();

      renderColors();
      generate();
    }

    function changeColorAmount(amount) {
      setColorAmount(colors.length + amount);
    }

    function changeValue(id, amount) {
      const el = document.getElementById(id);
      el.value = Math.max(Number(el.min || 0), Number(el.value) + amount);
      generate();
    }

    function hexToRgb(hex) {
      hex = hex.replace("#", "");

      return {
        r: parseInt(hex.slice(0, 2), 16),
        g: parseInt(hex.slice(2, 4), 16),
        b: parseInt(hex.slice(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      const hex = [r, g, b].map(x => {
        const h = Math.round(x).toString(16).padStart(2, "0");
        return lowercaseHex.checked ? h.toLowerCase() : h.toUpperCase();
      }).join("");

      return "#" + hex;
    }

    function rgbToHsv(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const d = max - min;

      let h = 0;
      const s = max === 0 ? 0 : d / max;
      const v = max;

      if (max !== min) {
        if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
        if (max === g) h = (b - r) / d + 2;
        if (max === b) h = (r - g) / d + 4;
        h /= 6;
      }

      return { h, s, v };
    }

    function hsvToRgb(h, s, v) {
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);

      let r, g, b;

      switch (i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
      }

      return {
        r: r * 255,
        g: g * 255,
        b: b * 255
      };
    }

    function interpolateColor(a, b, t) {
      const rgbA = hexToRgb(a);
      const rgbB = hexToRgb(b);

      if (gradientType.value === "hsv") {
        const hsvA = rgbToHsv(rgbA.r, rgbA.g, rgbA.b);
        const hsvB = rgbToHsv(rgbB.r, rgbB.g, rgbB.b);

        let dh = hsvB.h - hsvA.h;

        if (dh > 0.5) dh -= 1;
        if (dh < -0.5) dh += 1;

        let h = hsvA.h + dh * t;

        if (h < 0) h += 1;
        if (h > 1) h -= 1;

        const s = hsvA.s + (hsvB.s - hsvA.s) * t;
        const v = hsvA.v + (hsvB.v - hsvA.v) * t;
        const rgb = hsvToRgb(h, s, v);

        return rgbToHex(rgb.r, rgb.g, rgb.b);
      }

      return rgbToHex(
        rgbA.r + (rgbB.r - rgbA.r) * t,
        rgbA.g + (rgbB.g - rgbA.g) * t,
        rgbA.b + (rgbB.b - rgbA.b) * t
      );
    }

    function getGradient(text) {
      const chars = [...text];
      const colored = [];
      const perColor = Math.max(1, Number(charsPerColor.value));

      let colorableIndexes = chars
        .map((char, index) => ({ char, index }))
        .filter(item => !(trimSpaces.checked && item.char === " "))
        .map(item => item.index);

      if (colorableIndexes.length === 0) {
        colorableIndexes = chars.map((_, i) => i);
      }

      chars.forEach((char, index) => {
        if (trimSpaces.checked && char === " ") {
          colored.push({ char, color: null });
          return;
        }

        const position = colorableIndexes.indexOf(index);
        const total = colorableIndexes.length;

        const adjustedPosition = alwaysDisperse.checked
          ? position
          : Math.floor(position / perColor);

        const adjustedTotal = alwaysDisperse.checked
          ? total - 1
          : Math.max(1, Math.ceil(total / perColor) - 1);

        const globalT = adjustedTotal <= 0 ? 0 : adjustedPosition / adjustedTotal;

        const segmentCount = colors.length - 1;
        const scaled = globalT * segmentCount;
        const segment = Math.min(segmentCount - 1, Math.floor(scaled));
        const localT = scaled - segment;

        colored.push({
          char,
          color: interpolateColor(colors[segment], colors[segment + 1], localT)
        });
      });

      return colored;
    }

    function legacyHex(hex, symbol) {
      return symbol + "x" + hex.replace("#", "").split("").map(c => symbol + c).join("");
    }

    function styleCodes(symbol) {
      let codes = "";

      if (activeStyles.bold) codes += symbol + "l";
      if (activeStyles.italic) codes += symbol + "o";
      if (activeStyles.underline) codes += symbol + "n";
      if (activeStyles.strike) codes += symbol + "m";
      if (activeStyles.obfuscate) codes += symbol + "k";

      return codes;
    }

    function miniStyles() {
      let codes = "";

      if (activeStyles.bold) codes += "<bold>";
      if (activeStyles.italic) codes += "<italic>";
      if (activeStyles.underline) codes += "<underlined>";
      if (activeStyles.strike) codes += "<strikethrough>";
      if (activeStyles.obfuscate) codes += "<obfuscated>";

      return codes;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatText(items) {
      if (format.value === "json") {
        return JSON.stringify(items.map(item => ({
          text: item.char,
          color: item.color || undefined,
          bold: activeStyles.bold || undefined,
          italic: activeStyles.italic || undefined,
          underlined: activeStyles.underline || undefined,
          strikethrough: activeStyles.strike || undefined,
          obfuscated: activeStyles.obfuscate || undefined
        })), null, 2);
      }

      const result = items.map(item => {
        if (!item.color) return item.char;

        if (format.value === "ampHex") {
          return `&${item.color}${styleCodes("&")}${item.char}`;
        }

        if (format.value === "minimessage") {
          return `<${item.color}>${miniStyles()}${item.char}`;
        }

        if (format.value === "section") {
          return legacyHex(item.color, "§") + styleCodes("§") + item.char;
        }

        if (format.value === "ampersand") {
          return legacyHex(item.color, "&") + styleCodes("&") + item.char;
        }

        if (format.value === "bracket") {
          return `<${item.color}>${miniStyles()}${item.char}`;
        }

        return item.char;
      }).join("");

      const wrapper = prefixSuffix.value.trim();

      if (wrapper.includes("$t")) {
        return wrapper.replace("$t", result);
      }

      return wrapper ? wrapper + result : result;
    }

    function generate() {
      const text = inputText.value;

      if (!text || colors.length < 2) {
        output.value = "Error! Not enough colors.";
        preview.textContent = "";
        return;
      }

      const items = getGradient(text);

      preview.innerHTML = items.map(item => {
        let css = "";

        if (item.color) css += `color:${item.color};`;
        if (activeStyles.bold) css += "font-weight:900;";
        if (activeStyles.italic) css += "font-style:italic;";

        const decorations = [];

        if (activeStyles.underline) decorations.push("underline");
        if (activeStyles.strike) decorations.push("line-through");

        if (decorations.length) {
          css += `text-decoration:${decorations.join(" ")};`;
        }

        return `<span style="${css}">${escapeHtml(item.char)}</span>`;
      }).join("");

      output.value = formatText(items);
    }

    function copyOutput() {
      navigator.clipboard.writeText(output.value);

      const btn = event.target;
      const old = btn.innerText;

      btn.innerText = "Copied!";
      setTimeout(() => btn.innerText = old, 1200);
    }

    function copyColors() {
      navigator.clipboard.writeText(JSON.stringify(colors));
    }

    function swapColors() {
      if (colors.length >= 2) {
        const first = colors[0];
        colors[0] = colors[colors.length - 1];
        colors[colors.length - 1] = first;
        renderColors();
        generate();
      }
    }

    function reverseColors() {
      colors.reverse();
      renderColors();
      generate();
    }

    function shuffleColors() {
      colors = colors.sort(() => Math.random() - 0.5);
      renderColors();
      generate();
    }

    function randomHex() {
      return "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");
    }

    function randomColors() {
      colors = colors.map(() => randomHex());
      renderColors();
      generate();
    }

    function resetTool() {
      inputText.value = "";
      colors = ["#ef4444", "#ffffff"];
      charsPerColor.value = 1;
      colorAmount.value = 2;
      format.value = "ampHex";
      gradientType.value = "rgb";
      prefixSuffix.value = "";
      trimSpaces.checked = true;
      lowercaseHex.checked = false;
      alwaysDisperse.checked = false;

      Object.keys(activeStyles).forEach(key => activeStyles[key] = false);

      document.querySelectorAll(".style-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      renderColors();
      generate();
    }

    renderColors();
    generate();
  </script>

</body>
</html>
