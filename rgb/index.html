<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGBirdflop | onlyarial</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icon-oa.png?v=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1724;
      color: #f8fafc;
      font-family: Inter, Arial, sans-serif;
      padding: 32px 18px;
    }

    .page {
      max-width: 1180px;
      margin: auto;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 22px;
      color: white;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .back-btn:hover {
      border-color: #3b82f6;
      background: #253449;
    }

    .header {
      border-bottom: 1px solid #243244;
      padding-bottom: 22px;
      margin-bottom: 26px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 15px;
    }

    .input-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }

    .format-buttons {
      display: flex;
      gap: 8px;
      background: #172235;
      border: 1px solid #2b3b52;
      border-radius: 12px;
      padding: 6px;
    }

    .style-btn {
      background: transparent;
      color: #f8fafc;
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .style-btn.active {
      background: #2563eb;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #e2e8f0;
      font-weight: 700;
      font-size: 15px;
    }

    textarea,
    input,
    select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #2b3b52;
      background: #1e293b;
      color: white;
      padding: 13px;
      font-size: 16px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 46px;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 290px 1fr 290px;
      gap: 18px;
      margin-top: 30px;
    }

    .section {
      border-right: 1px solid #223047;
      padding-right: 16px;
    }

    .section:last-child {
      border-right: none;
      padding-right: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .step-row {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      gap: 7px;
      align-items: center;
      margin-bottom: 14px;
    }

    .small-btn {
      background: #1e293b;
      color: white;
      border: 1px solid #2b3b52;
      border-radius: 10px;
      padding: 11px 0;
      font-size: 22px;
      cursor: pointer;
    }

    .small-btn:hover {
      background: #253449;
    }

    .color-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .color-item {
      display: grid;
      grid-template-columns: 42px 1fr 36px;
      gap: 8px;
      align-items: center;
    }

    .color-item input[type="color"] {
      padding: 4px;
      height: 42px;
      cursor: pointer;
    }

    .remove-color {
      background: #1e293b;
      border: 1px solid #2b3b52;
      color: #f8fafc;
      border-radius: 10px;
      height: 42px;
      cursor: pointer;
      font-weight: 800;
    }

    .tool-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tool-btn {
      background: #1e293b;
      color: white;
      border: 1px solid #2b3b52;
      border-radius: 9px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .tool-btn:hover {
      background: #253449;
    }

    .output-area {
      min-height: 128px;
      font-family: monospace;
    }

    .preview {
      margin-top: 14px;
      padding: 16px;
      min-height: 66px;
      background: #111827;
      border: 1px solid #2b3b52;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 800;
      word-break: break-word;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: #e2e8f0;
      font-weight: 700;
    }

    .toggle input {
      width: 22px;
      height: 22px;
    }

    .primary {
      background: #2563eb;
      color: white;
      border: 1px solid #3b82f6;
      border-radius: 10px;
      padding: 12px 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary:hover {
      background: #3b82f6;
    }

    .danger {
      background: #ef4444;
      border-color: #f87171;
    }

    .info {
      margin-top: 34px;
      color: #e2e8f0;
      line-height: 1.5;
      font-size: 15px;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 950px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .section {
        border-right: none;
        border-bottom: 1px solid #223047;
        padding-right: 0;
        padding-bottom: 22px;
      }

      .input-top {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <a class="back-btn" href="../">← Back Home</a>

    <div class="header">
      <h1>🎨 RGBirdflop</h1>
      <div class="subtitle">
        Hex gradient text generator for Minecraft formatting.
      </div>
    </div>

    <div class="input-top">
      <div>
        <label for="inputText">›_ Input Text</label>
        <textarea id="inputText" placeholder="Type here to generate a gradient!"></textarea>
      </div>

      <div class="format-buttons">
        <button class="style-btn" data-style="bold">B</button>
        <button class="style-btn" data-style="italic"><i>I</i></button>
        <button class="style-btn" data-style="underline"><u>U</u></button>
        <button class="style-btn" data-style="strike"><s>S</s></button>
        <button class="style-btn" data-style="obfuscate">🪄</button>
      </div>
    </div>

    <div class="main-grid">

      <div class="section">
        <div class="section-title">🎨 Colors</div>

        <label>Characters per color</label>
        <div class="step-row">
          <button class="small-btn" onclick="changeValue('charsPerColor', -1)">−</button>
          <input id="charsPerColor" type="number" min="1" value="1">
          <button class="small-btn" onclick="changeValue('charsPerColor', 1)">+</button>
        </div>

        <label>Color Amount</label>
        <div class="step-row">
          <button class="small-btn" onclick="changeColorAmount(-1)">−</button>
          <input id="colorAmount" type="number" min="2" value="2">
          <button class="small-btn" onclick="changeColorAmount(1)">+</button>
        </div>

        <div id="colorList" class="color-list"></div>

        <div class="tool-row">
          <button class="tool-btn" onclick="addColor()">＋ Add</button>
          <button class="tool-btn" onclick="copyColors()">⧉ Copy</button>
          <button class="tool-btn" onclick="swapColors()">↔ Swap</button>
          <button class="tool-btn" onclick="shuffleColors()">⤨ Shuffle</button>
          <button class="tool-btn" onclick="randomColors()">◔ Random</button>
          <button class="tool-btn" onclick="reverseColors()">↔ Reverse</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📋 Output</div>
        <div style="color:#94a3b8;margin-bottom:10px;">Copy-paste this for RGB text!</div>

        <textarea id="output" class="output-area" readonly></textarea>

        <label>Preview</label>
        <div id="preview" class="preview"></div>

        <div class="section-title" style="margin-top:18px;">⚙ Options</div>

        <div class="options-grid">
          <div>
            <label>Color Format</label>
            <select id="format">
              <option value="ampHex">&#rrggbb</option>
              <option value="minimessage">MiniMessage</option>
              <option value="json">JSON</option>
              <option value="section">§x§r§r§g§g§b§b</option>
              <option value="ampersand">&x&r&r&g&g&b&b</option>
              <option value="bracket">&lt;#rrggbb&gt;</option>
            </select>
          </div>

          <div>
            <label>Gradient Type</label>
            <select id="gradientType">
              <option value="rgb">rgb</option>
              <option value="hsv">hsv</option>
            </select>
          </div>
        </div>

        <label>Prefix/Suffix</label>
        <input id="prefixSuffix" placeholder="/nick $t">

        <label class="toggle">
          <input id="trimSpaces" type="checkbox" checked>
          Trim colors from spaces
        </label>

        <label class="toggle">
          <input id="lowercaseHex" type="checkbox">
          Lowercase Hex Codes
        </label>

        <label class="toggle">
          <input id="alwaysDisperse" type="checkbox">
          Always Disperse Colors
        </label>

        <div class="tool-row">
          <button class="primary" onclick="copyOutput()">Copy</button>
          <button class="primary danger" onclick="resetTool()">Reset</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">💾 Presets</div>

        <select id="presetSelect">
          <option value="">Saved Presets</option>
        </select>

        <div class="tool-row">
          <button class="primary" onclick="savePreset()">💾 Save</button>
        </div>

        <label>Import - Paste JSON preset</label>
        <textarea id="importBox" placeholder="Import - Paste here"></textarea>

        <div class="tool-row">
          <button class="tool-btn" onclick="copyPreset()">Copy</button>
          <button class="tool-btn" onclick="importPreset()">Import</button>
        </div>
      </div>

    </div>

    <div class="info">
      RGBirdflop is a browser-based Minecraft RGB gradient creator. This remake is self-hosted and made for onlyarial tools.
    </div>

    <div class="footer">By onlyarial</div>
  </div>

  <script>
    const inputText = document.getElementById("inputText");
    const output = document.getElementById("output");
    const preview = document.getElementById("preview");
    const colorList = document.getElementById("colorList");
    const colorAmount = document.getElementById("colorAmount");
    const charsPerColor = document.getElementById("charsPerColor");
    const format = document.getElementById("format");
    const gradientType = document.getElementById("gradientType");
    const prefixSuffix = document.getElementById("prefixSuffix");
    const trimSpaces = document.getElementById("trimSpaces");
    const lowercaseHex = document.getElementById("lowercaseHex");
    const alwaysDisperse = document.getElementById("alwaysDisperse");
    const presetSelect = document.getElementById("presetSelect");
    const importBox = document.getElementById("importBox");

    let colors = ["#ff0000", "#ffffff"];

    const activeStyles = {
      bold: false,
      italic: false,
      underline: false,
      strike: false,
      obfuscate: false
    };

    document.querySelectorAll(".style-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const style = btn.dataset.style;
        activeStyles[style] = !activeStyles[style];
        btn.classList.toggle("active", activeStyles[style]);
        generate();
      });
    });

    [
      inputText,
      charsPerColor,
      format,
      gradientType,
      prefixSuffix,
      trimSpaces,
      lowercaseHex,
      alwaysDisperse
    ].forEach(el => {
      el.addEventListener("input", generate);
      el.addEventListener("change", generate);
    });

    colorAmount.addEventListener("input", () => {
      setColorAmount(Number(colorAmount.value));
    });

    presetSelect.addEventListener("change", loadPreset);

    function renderColors() {
      colorList.innerHTML = "";

      colors.forEach((color, index) => {
        const row = document.createElement("div");
        row.className = "color-item";

        row.innerHTML = `
          <input type="color" value="${color}" data-index="${index}">
          <input type="text" value="${color}" data-index="${index}">
          <button class="remove-color" onclick="removeColor(${index})">×</button>
        `;

        colorList.appendChild(row);
      });

      colorList.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", e => {
          const index = Number(e.target.dataset.index);
          let value = e.target.value;

          if (!value.startsWith("#")) value = "#" + value;
          if (/^#[0-9a-fA-F]{6}$/.test(value)) {
            colors[index] = value;
            renderColors();
            generate();
          }
        });
      });

      colorAmount.value = colors.length;
    }

    function addColor() {
      colors.push(randomHex());
      renderColors();
      generate();
    }

    function removeColor(index) {
      if (colors.length <= 2) return;
      colors.splice(index, 1);
      renderColors();
      generate();
    }

    function setColorAmount(amount) {
      amount = Math.max(2, amount || 2);

      while (colors.length < amount) colors.push(randomHex());
      while (colors.length > amount) colors.pop();

      renderColors();
      generate();
    }

    function changeColorAmount(amount) {
      setColorAmount(colors.length + amount);
    }

    function changeValue(id, amount) {
      const el = document.getElementById(id);
      el.value = Math.max(Number(el.min || 0), Number(el.value) + amount);
      generate();
    }

    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      return {
        r: parseInt(hex.slice(0, 2), 16),
        g: parseInt(hex.slice(2, 4), 16),
        b: parseInt(hex.slice(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      const hex = [r, g, b].map(x => {
        const h = Math.round(x).toString(16).padStart(2, "0");
        return lowercaseHex.checked ? h.toLowerCase() : h.toUpperCase();
      }).join("");

      return "#" + hex;
    }

    function rgbToHsv(r, g, b) {
      r /= 255; g /= 255; b /= 255;

      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h, s, v = max;
      const d = max - min;

      s = max === 0 ? 0 : d / max;

      if (max === min) h = 0;
      else {
        switch(max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }

        h /= 6;
      }

      return { h, s, v };
    }

    function hsvToRgb(h, s, v) {
      let r, g, b;
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);

      switch(i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
      }

      return {
        r: r * 255,
        g: g * 255,
        b: b * 255
      };
    }

    function interpolateColor(a, b, t) {
      const rgbA = hexToRgb(a);
      const rgbB = hexToRgb(b);

      if (gradientType.value === "hsv") {
        const hsvA = rgbToHsv(rgbA.r, rgbA.g, rgbA.b);
        const hsvB = rgbToHsv(rgbB.r, rgbB.g, rgbB.b);

        let dh = hsvB.h - hsvA.h;
        if (dh > 0.5) dh -= 1;
        if (dh < -0.5) dh += 1;

        let h = hsvA.h + dh * t;
        if (h < 0) h += 1;
        if (h > 1) h -= 1;

        return rgbToHex(
          hsvToRgb(h, hsvA.s + (hsvB.s - hsvA.s) * t, hsvA.v + (hsvB.v - hsvA.v) * t).r,
          hsvToRgb(h, hsvA.s + (hsvB.s - hsvA.s) * t, hsvA.v + (hsvB.v - hsvA.v) * t).g,
          hsvToRgb(h, hsvA.s + (hsvB.s - hsvA.s) * t, hsvA.v + (hsvB.v - hsvA.v) * t).b
        );
      }

      return rgbToHex(
        rgbA.r + (rgbB.r - rgbA.r) * t,
        rgbA.g + (rgbB.g - rgbA.g) * t,
        rgbA.b + (rgbB.b - rgbA.b) * t
      );
    }

    function getGradient(text) {
      const chars = [...text];
      const colored = [];
      const perColor = Math.max(1, Number(charsPerColor.value));

      let colorableIndexes = chars
        .map((char, index) => ({ char, index }))
        .filter(item => !(trimSpaces.checked && item.char === " "))
        .map(item => item.index);

      if (colorableIndexes.length === 0) colorableIndexes = chars.map((_, i) => i);

      chars.forEach((char, index) => {
        if (trimSpaces.checked && char === " ") {
          colored.push({ char, color: null });
          return;
        }

        const position = colorableIndexes.indexOf(index);
        const total = colorableIndexes.length;

        const adjustedPosition = alwaysDisperse.checked
          ? position
          : Math.floor(position / perColor);

        const adjustedTotal = alwaysDisperse.checked
          ? total - 1
          : Math.max(1, Math.ceil(total / perColor) - 1);

        const globalT = adjustedTotal <= 0 ? 0 : adjustedPosition / adjustedTotal;

        const segmentCount = colors.length - 1;
        const scaled = globalT * segmentCount;
        const segment = Math.min(segmentCount - 1, Math.floor(scaled));
        const localT = scaled - segment;

        colored.push({
          char,
          color: interpolateColor(colors[segment], colors[segment + 1], localT)
        });
      });

      return colored;
    }

    function legacyHex(hex, symbol) {
      return symbol + "x" + hex.replace("#", "").split("").map(c => symbol + c).join("");
    }

    function styleCodes(symbol) {
      let codes = "";
      if (activeStyles.bold) codes += symbol + "l";
      if (activeStyles.italic) codes += symbol + "o";
      if (activeStyles.underline) codes += symbol + "n";
      if (activeStyles.strike) codes += symbol + "m";
      if (activeStyles.obfuscate) codes += symbol + "k";
      return codes;
    }

    function miniStyles() {
      let codes = "";
      if (activeStyles.bold) codes += "<bold>";
      if (activeStyles.italic) codes += "<italic>";
      if (activeStyles.underline) codes += "<underlined>";
      if (activeStyles.strike) codes += "<strikethrough>";
      if (activeStyles.obfuscate) codes += "<obfuscated>";
      return codes;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatText(items) {
      let result = "";

      if (format.value === "json") {
        return JSON.stringify(items.map(item => ({
          text: item.char,
          color: item.color || undefined,
          bold: activeStyles.bold || undefined,
          italic: activeStyles.italic || undefined,
          underlined: activeStyles.underline || undefined,
          strikethrough: activeStyles.strike || undefined,
          obfuscated: activeStyles.obfuscate || undefined
        })), null, 2);
      }

      result = items.map(item => {
        if (!item.color) return item.char;

        if (format.value === "ampHex") return `&${item.color}${styleCodes("&")}${item.char}`;
        if (format.value === "minimessage") return `<${item.color}>${miniStyles()}${item.char}`;
        if (format.value === "section") return legacyHex(item.color, "§") + styleCodes("§") + item.char;
        if (format.value === "ampersand") return legacyHex(item.color, "&") + styleCodes("&") + item.char;
        if (format.value === "bracket") return `<${item.color}>${miniStyles()}${item.char}`;

        return item.char;
      }).join("");

      const wrapper = prefixSuffix.value.trim();

      if (wrapper.includes("$t")) {
        return wrapper.replace("$t", result);
      }

      return wrapper ? wrapper + result : result;
    }

    function generate() {
      const text = inputText.value;

      if (!text || colors.length < 2) {
        output.value = "Error! Not enough colors.";
        preview.textContent = "";
        return;
      }

      const items = getGradient(text);

      preview.innerHTML = items.map(item => {
        let css = "";
        if (item.color) css += `color:${item.color};`;
        if (activeStyles.bold) css += "font-weight:900;";
        if (activeStyles.italic) css += "font-style:italic;";

        const decorations = [];
        if (activeStyles.underline) decorations.push("underline");
        if (activeStyles.strike) decorations.push("line-through");

        if (decorations.length) css += `text-decoration:${decorations.join(" ")};`;

        return `<span style="${css}">${escapeHtml(item.char)}</span>`;
      }).join("");

      output.value = formatText(items);
    }

    function copyOutput() {
      navigator.clipboard.writeText(output.value);
    }

    function copyColors() {
      navigator.clipboard.writeText(JSON.stringify(colors));
    }

    function swapColors() {
      if (colors.length >= 2) {
        const first = colors[0];
        colors[0] = colors[colors.length - 1];
        colors[colors.length - 1] = first;
        renderColors();
        generate();
      }
    }

    function reverseColors() {
      colors.reverse();
      renderColors();
      generate();
    }

    function shuffleColors() {
      colors = colors.sort(() => Math.random() - 0.5);
      renderColors();
      generate();
    }

    function randomHex() {
      return "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");
    }

    function randomColors() {
      colors = colors.map(() => randomHex());
      renderColors();
      generate();
    }

    function savePreset() {
      const name = prompt("Preset name?");
      if (!name) return;

      const data = {
        colors,
        charsPerColor: charsPerColor.value,
        format: format.value,
        gradientType: gradientType.value,
        activeStyles
      };

      localStorage.setItem("rgb-preset-" + name, JSON.stringify(data));
      loadPresetList();
    }

    function loadPresetList() {
      presetSelect.innerHTML = `<option value="">Saved Presets</option>`;

      Object.keys(localStorage)
        .filter(key => key.startsWith("rgb-preset-"))
        .forEach(key => {
          const name = key.replace("rgb-preset-", "");
          const option = document.createElement("option");
          option.value = key;
          option.textContent = name;
          presetSelect.appendChild(option);
        });
    }

    function loadPreset() {
      if (!presetSelect.value) return;

      const data = JSON.parse(localStorage.getItem(presetSelect.value));

      colors = data.colors || colors;
      charsPerColor.value = data.charsPerColor || 1;
      format.value = data.format || "ampHex";
      gradientType.value = data.gradientType || "rgb";

      Object.assign(activeStyles, data.activeStyles || {});

      document.querySelectorAll(".style-btn").forEach(btn => {
        btn.classList.toggle("active", activeStyles[btn.dataset.style]);
      });

      renderColors();
      generate();
    }

    function copyPreset() {
      const data = {
        colors,
        charsPerColor: charsPerColor.value,
        format: format.value,
        gradientType: gradientType.value,
        activeStyles
      };

      navigator.clipboard.writeText(JSON.stringify(data));
    }

    function importPreset() {
      try {
        const data = JSON.parse(importBox.value);

        colors = data.colors || colors;
        charsPerColor.value = data.charsPerColor || 1;
        format.value = data.format || "ampHex";
        gradientType.value = data.gradientType || "rgb";

        Object.assign(activeStyles, data.activeStyles || {});

        renderColors();
        generate();
      } catch {
        alert("Invalid preset JSON.");
      }
    }

    function resetTool() {
      inputText.value = "";
      colors = ["#ff0000", "#ffffff"];
      charsPerColor.value = 1;
      colorAmount.value = 2;
      format.value = "ampHex";
      gradientType.value = "rgb";
      prefixSuffix.value = "";
      trimSpaces.checked = true;
      lowercaseHex.checked = false;
      alwaysDisperse.checked = false;

      Object.keys(activeStyles).forEach(key => activeStyles[key] = false);
      document.querySelectorAll(".style-btn").forEach(btn => btn.classList.remove("active"));

      renderColors();
      generate();
    }

    loadPresetList();
    renderColors();
    generate();
  </script>

</body>
</html>
