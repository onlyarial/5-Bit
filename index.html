<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tools | onlyarial</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./icon-oa.png?v=1">
  <link rel="shortcut icon" href="./icon-oa.png?v=1">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1115;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 22px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .logo {
      width: 120px;
      height: auto;
      margin-top: 18px;
      margin-bottom: 10px;
      border-radius: 18px;
    }

    h1 {
      margin-top: 0;
      font-size: 38px;
    }

    p {
      color: #9ca3af;
      font-size: 16px;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 30px;
    }

    a {
      text-decoration: none;
      background: #11141a;
      color: white;
      border: 1px solid #2a2f3a;
      border-radius: 18px;
      padding: 28px;
      transition: 0.2s;
    }

    a:hover {
      border-color: #ef4444;
      transform: translateY(-3px);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .desc {
      color: #9ca3af;
      font-size: 14px;
    }

    .footer {
      margin-top: 28px;
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .tools {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>OnlyArial's Tools</h1>
    <img src="images/tools.png" class="logo">
    <p>Minecraft UI tools for fonts, tags, etc.</p>

    <div class="tools">
      <a href="5bit/">
        <div class="title">5-Bit Font Converter</div>
        <div class="desc">Convert normal text into small UI-style font characters.</div>
      </a>

      <a href="tag-tool/">
        <div class="title">Tag Tool</div>
        <div class="desc">Create clean PNG rank/tag icons for Minecraft UI.</div>
      </a>
    </div>

    <div class="footer">By onlyarial</div>
  </div>

</body>
</html>
