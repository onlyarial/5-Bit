<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tag Tool | onlyarial</title>
  <link rel="icon" type="image/png" href="../favicon.png">

  <style>
    * {
      box-sizing: border-box;
      image-rendering: pixelated;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1115;
      color: #ffffff;
      font-family: Inter, Arial, sans-serif;
      padding: 40px 20px;
    }

    .wrapper {
      max-width: 1400px;
      margin: auto;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 24px;
      color: white;
      background: #232833;
      border: 1px solid #2a2f3a;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .back-btn:hover {
      background: #2f3644;
      border-color: #ef4444;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .subtitle {
      margin-top: 10px;
      margin-bottom: 40px;
      color: #9ca3af;
      font-size: 15px;
      line-height: 1.6;
    }

    .preview {
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 22px;
      padding: 40px;
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary-btn {
      background: #ef4444;
      color: white;
    }

    .primary-btn:hover {
      background: #f87171;
    }

    .secondary-btn {
      background: #232833;
      color: white;
    }

    .secondary-btn:hover {
      background: #2f3644;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .panel {
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a2f3a;
      background: #0f1115;
      color: white;
      padding: 12px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    .footer {
      margin-top: 34px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <a class="back-btn" href="../">← Back Home</a>

    <h1>Tag Tool</h1>

    <div class="subtitle">
      Create pixel art tags effortlessly with Tag Tool. No pixel art experience needed! Enjoy several styling options to make your tags unique and professional.
    </div>

    <div class="preview">
      <canvas id="canvas"></canvas>
    </div>

    <div class="buttons">
      <button class="primary-btn" onclick="copyPNG()">Copy</button>
      <button class="primary-btn" onclick="downloadPNG()">Save</button>
      <button class="secondary-btn" onclick="resetTool()">Reset</button>
    </div>

    <div class="layout">

      <div class="panel">
        <h2>BACKGROUND</h2>

        <label>H-Padding</label>
        <input id="hPadding" type="range" min="0" max="20" value="4">

        <label>V-Padding</label>
        <input id="vPadding" type="range" min="0" max="20" value="2">

        <label>Background Color 1</label>
        <input id="bg1" type="color" value="#000000">

        <label>Background Color 2</label>
        <input id="bg2" type="color" value="#2b2b2b">
      </div>

      <div class="panel">
        <h2>TEXT</h2>

        <label>Text Input</label>
        <input id="text" value="JEQO">

        <label>Text Color 1</label>
        <input id="text1" type="color" value="#ffffff">

        <label>Text Color 2</label>
        <input id="text2" type="color" value="#cfcfcf">

        <label>Shadow Color</label>
        <input id="shadowColor" type="color" value="#000000">
      </div>

      <div class="panel">
        <h2>OPTIONS</h2>

        <label>Background Direction</label>
        <select id="bgDirection">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>

        <label>Text Direction</label>
        <select id="textDirection">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>

        <label>Rounded Corners</label>
        <select id="rounded">
          <option value="off">Off</option>
          <option value="on">On</option>
        </select>

        <label>Shadow</label>
        <select id="shadow">
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </div>

    </div>

    <div class="footer">
      By onlyarial
    </div>

  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const chars = {
      A:["01110","10001","11111","10001","10001"],
      B:["11110","10001","11110","10001","11110"],
      C:["01111","10000","10000","10000","01111"],
      D:["11110","10001","10001","10001","11110"],
      E:["11111","10000","11110","10000","11111"],
      F:["11111","10000","11110","10000","10000"],
      G:["01111","10000","10111","10001","01111"],
      H:["10001","10001","11111","10001","10001"],
      I:["11111","00100","00100","00100","11111"],
      J:["00111","00010","00010","10010","01100"],
      K:["10001","10010","11100","10010","10001"],
      L:["10000","10000","10000","10000","11111"],
      M:["10001","11011","10101","10001","10001"],
      N:["10001","11001","10101","10011","10001"],
      O:["01110","10001","10001","10001","01110"],
      P:["11110","10001","11110","10000","10000"],
      Q:["01110","10001","10001","10011","01111"],
      R:["11110","10001","11110","10010","10001"],
      S:["01111","10000","01110","00001","11110"],
      T:["11111","00100","00100","00100","00100"],
      U:["10001","10001","10001","10001","01110"],
      V:["10001","10001","10001","01010","00100"],
      W:["10001","10001","10101","11011","10001"],
      X:["10001","01010","00100","01010","10001"],
      Y:["10001","01010","00100","00100","00100"],
      Z:["11111","00010","00100","01000","11111"],
      " ":["00000","00000","00000","00000","00000"]
    };

    document.querySelectorAll("input, select")
      .forEach(el => el.addEventListener("input", draw));

    function hexToRgb(hex) {
      const bigint = parseInt(hex.slice(1), 16);

      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function gradientColor(c1, c2, t) {
      const a = hexToRgb(c1);
      const b = hexToRgb(c2);

      return `rgb(
        ${lerp(a.r,b.r,t)},
        ${lerp(a.g,b.g,t)},
        ${lerp(a.b,b.b,t)}
      )`;
    }

    function drawPixel(x, y, size, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, size, size);
    }

    function draw() {

      const text = document.getElementById("text").value.toUpperCase();

      const bg1 = document.getElementById("bg1").value;
      const bg2 = document.getElementById("bg2").value;

      const text1 = document.getElementById("text1").value;
      const text2 = document.getElementById("text2").value;

      const shadowColor = document.getElementById("shadowColor").value;

      const hPadding = parseInt(document.getElementById("hPadding").value);
      const vPadding = parseInt(document.getElementById("vPadding").value);

      const bgDirection = document.getElementById("bgDirection").value;
      const textDirection = document.getElementById("textDirection").value;

      const rounded = document.getElementById("rounded").value === "on";
      const shadow = document.getElementById("shadow").value === "on";

      const pixel = 12;

      const totalW = text.length * 6 - 1 + hPadding * 2;
      const totalH = 5 + vPadding * 2;

      canvas.width = totalW * pixel;
      canvas.height = totalH * pixel;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for(let y = 0; y < totalH; y++) {
        for(let x = 0; x < totalW; x++) {

          if (rounded) {

            const radius = 2;

            const topLeft =
              x < radius && y < radius &&
              (x - radius) ** 2 + (y - radius) ** 2 > radius ** 2;

            const topRight =
              x >= totalW - radius && y < radius &&
              (x - (totalW - radius - 1)) ** 2 +
              (y - radius) ** 2 > radius ** 2;

            const bottomLeft =
              x < radius && y >= totalH - radius &&
              (x - radius) ** 2 +
              (y - (totalH - radius - 1)) ** 2 > radius ** 2;

            const bottomRight =
              x >= totalW - radius && y >= totalH - radius &&
              (x - (totalW - radius - 1)) ** 2 +
              (y - (totalH - radius - 1)) ** 2 > radius ** 2;

            if (topLeft || topRight || bottomLeft || bottomRight) {
              continue;
            }
          }

          const t = bgDirection === "horizontal"
            ? x / totalW
            : y / totalH;

          const color = gradientColor(bg1, bg2, t);

          drawPixel(x * pixel, y * pixel, pixel, color);
        }
      }

      for(let i = 0; i < text.length; i++) {

        const char = chars[text[i]] || chars[" "];

        for(let y = 0; y < 5; y++) {
          for(let x = 0; x < 5; x++) {

            if(char[y][x] === "1") {

              const px = (x + i * 6 + hPadding) * pixel;
              const py = (y + vPadding) * pixel;

              const t = textDirection === "horizontal"
                ? x / 5
                : y / 5;

              const color = gradientColor(text1, text2, t);

              if (shadow) {
                drawPixel(px + pixel, py + pixel, pixel, shadowColor);
              }

              drawPixel(px, py, pixel, color);
            }
          }
        }
      }
    }

    function downloadPNG() {
      const link = document.createElement("a");
      link.download = "tag.png";
      link.href = canvas.toDataURL();
      link.click();
    }

    async function copyPNG() {

      canvas.toBlob(async blob => {

        try {

          await navigator.clipboard.write([
            new ClipboardItem({
              "image/png": blob
            })
          ]);

        } catch {
          alert("Clipboard copy failed.");
        }
      });
    }

    function resetTool() {

      document.getElementById("text").value = "JEQO";
      document.getElementById("bg1").value = "#000000";
      document.getElementById("bg2").value = "#2b2b2b";
      document.getElementById("text1").value = "#ffffff";
      document.getElementById("text2").value = "#cfcfcf";
      document.getElementById("shadowColor").value = "#000000";
      document.getElementById("hPadding").value = 4;
      document.getElementById("vPadding").value = 2;
      document.getElementById("bgDirection").value = "horizontal";
      document.getElementById("textDirection").value = "horizontal";
      document.getElementById("rounded").value = "off";
      document.getElementById("shadow").value = "on";

      draw();
    }

    draw();
  </script>

</body>
</html>
