<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tag Tool</title>

  <style>
    * {
      box-sizing: border-box;
      image-rendering: pixelated;
    }

    body {
      margin: 0;
      background: #0a0b0f;
      color: white;
      font-family: Arial, sans-serif;
      padding: 28px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
    }

    .subtitle {
      color: #8b949e;
      margin-top: 10px;
      margin-bottom: 35px;
      font-size: 15px;
    }

    .preview {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
    }

    canvas {
      background: transparent;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    button {
      background: #2f333d;
      border: none;
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.15s;
    }

    button:hover {
      background: #3b404d;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }

    .panel {
      background: #050608;
      border: 1px solid #111318;
      padding: 18px;
      border-radius: 14px;
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      margin-top: 18px;
      font-size: 14px;
      color: #d0d7de;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #2d333b;
      background: #161b22;
      color: white;
      font-size: 15px;
    }

    input[type="range"] {
      padding: 0;
    }

    .footer {
      margin-top: 35px;
      text-align: center;
      color: #6e7681;
      font-size: 13px;
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <h1>TAG TOOL</h1>

  <div class="subtitle">
    Create pixel art tags effortlessly with Tag Tool. No pixel art experience needed! Enjoy several styling options to make your tags unique and professional.
  </div>

  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

  <div class="buttons">
    <button onclick="copyPNG()">Copy</button>
    <button onclick="downloadPNG()">Save</button>
  </div>

  <div class="layout">

    <div class="panel">
      <h2>BACKGROUND</h2>

      <label>H-Padding</label>
      <input id="hPadding" type="range" min="0" max="20" value="4">

      <label>V-Padding</label>
      <input id="vPadding" type="range" min="0" max="20" value="2">

      <label>Background Color 1</label>
      <input id="bg1" type="color" value="#000000">

      <label>Background Color 2</label>
      <input id="bg2" type="color" value="#222222">
    </div>

    <div class="panel">
      <h2>TEXT</h2>

      <label>Text Input</label>
      <input id="text" value="Jeqo">

      <label>Text Color 1</label>
      <input id="text1" type="color" value="#ffffff">

      <label>Text Color 2</label>
      <input id="text2" type="color" value="#cccccc">

      <label>Shadow Color</label>
      <input id="shadowColor" type="color" value="#000000">
    </div>

    <div class="panel">
      <h2>OPTIONS</h2>

      <label>Background Direction</label>
      <select id="bgDirection">
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>

      <label>Text Direction</label>
      <select id="textDirection">
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>

      <label>Rounded Corners</label>
      <select id="rounded">
        <option value="off">Off</option>
        <option value="on">On</option>
      </select>

      <label>Shadow</label>
      <select id="shadow">
        <option value="on">On</option>
        <option value="off">Off</option>
      </select>
    </div>

  </div>

  <div class="footer">
    By onlyarial
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const chars = {
      A:["01110","10001","11111","10001","10001"],
      B:["11110","10001","11110","10001","11110"],
      C:["01111","10000","10000","10000","01111"],
      D:["11110","10001","10001","10001","11110"],
      E:["11111","10000","11110","10000","11111"],
      F:["11111","10000","11110","10000","10000"],
      G:["01111","10000","10111","10001","01111"],
      H:["10001","10001","11111","10001","10001"],
      I:["11111","00100","00100","00100","11111"],
      J:["00111","00010","00010","10010","01100"],
      K:["10001","10010","11100","10010","10001"],
      L:["10000","10000","10000","10000","11111"],
      M:["10001","11011","10101","10001","10001"],
      N:["10001","11001","10101","10011","10001"],
      O:["01110","10001","10001","10001","01110"],
      P:["11110","10001","11110","10000","10000"],
      Q:["01110","10001","10001","10011","01111"],
      R:["11110","10001","11110","10010","10001"],
      S:["01111","10000","01110","00001","11110"],
      T:["11111","00100","00100","00100","00100"],
      U:["10001","10001","10001","10001","01110"],
      V:["10001","10001","10001","01010","00100"],
      W:["10001","10001","10101","11011","10001"],
      X:["10001","01010","00100","01010","10001"],
      Y:["10001","01010","00100","00100","00100"],
      Z:["11111","00010","00100","01000","11111"],
      " ":["00000","00000","00000","00000","00000"]
    };

    const controls = document.querySelectorAll("input, select");

    controls.forEach(c => c.addEventListener("input", draw));

    function hexToRgb(hex) {
      const bigint = parseInt(hex.slice(1), 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function lerp(a,b,t) {
      return a + (b-a)*t;
    }

    function gradientColor(c1,c2,t) {
      const a = hexToRgb(c1);
      const b = hexToRgb(c2);

      return `rgb(
        ${lerp(a.r,b.r,t)},
        ${lerp(a.g,b.g,t)},
        ${lerp(a.b,b.b,t)}
      )`;
    }

    function drawPixel(x,y,size,color) {
      ctx.fillStyle = color;
      ctx.fillRect(x,y,size,size);
    }

    function draw() {
      const text = document.getElementById("text").value.toUpperCase();

      const bg1 = document.getElementById("bg1").value;
      const bg2 = document.getElementById("bg2").value;

      const text1 = document.getElementById("text1").value;
      const text2 = document.getElementById("text2").value;

      const shadowColor = document.getElementById("shadowColor").value;

      const hPadding = parseInt(document.getElementById("hPadding").value);
      const vPadding = parseInt(document.getElementById("vPadding").value);

      const bgDirection = document.getElementById("bgDirection").value;
      const textDirection = document.getElementById("textDirection").value;

      const rounded = document.getElementById("rounded").value === "on";
      const shadow = document.getElementById("shadow").value === "on";

      const pixel = 12;

      const width = (text.length * 6 - 1 + hPadding * 2) * pixel;
      const height = (5 + vPadding * 2) * pixel;

      canvas.width = width;
      canvas.height = height;

      ctx.clearRect(0,0,width,height);

      for(let y=0;y<5 + vPadding*2;y++) {
        for(let x=0;x<text.length*6-1 + hPadding*2;x++) {

          const t = bgDirection === "horizontal"
            ? x / width * pixel
            : y / height * pixel;

          let color = gradientColor(bg1,bg2,t);

          if(rounded) {
            const radius = 2;

            if(
              (x < radius && y < radius && (x-radius)**2 + (y-radius)**2 > radius**2) ||
              (x > (text.length*6-1+hPadding*2)-radius-1 && y < radius &&
              (x-((text.length*6-1+hPadding*2)-radius-1))**2 + (y-radius)**2 > radius**2)
            ) continue;
          }

          drawPixel(x*pixel,y*pixel,pixel,color);
        }
      }

      for(let i=0;i<text.length;i++) {
        const char = chars[text[i]] || chars[" "];

        for(let y=0;y<5;y++) {
          for(let x=0;x<5;x++) {

            if(char[y][x] === "1") {

              const px = (x + i*6 + hPadding) * pixel;
              const py = (y + vPadding) * pixel;

              const t = textDirection === "horizontal"
                ? x/5
                : y/5;

              const color = gradientColor(text1,text2,t);

              if(shadow) {
                drawPixel(px+pixel,py+pixel,pixel,shadowColor);
              }

              drawPixel(px,py,pixel,color);
            }
          }
        }
      }
    }

    function downloadPNG() {
      const link = document.createElement("a");
      link.download = "tag.png";
      link.href = canvas.toDataURL();
      link.click();
    }

    async function copyPNG() {
      canvas.toBlob(async blob => {
        await navigator.clipboard.write([
          new ClipboardItem({
            "image/png": blob
          })
        ]);
      });
    }

    draw();
  </script>

</body>
</html>
